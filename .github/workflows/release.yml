name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload artifacts to (e.g. v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build darwin arm64 binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/hnx ./cmd/hnx
          tar -C dist -czf dist/hnx_darwin_arm64.tar.gz hnx
          shasum -a 256 dist/hnx_darwin_arm64.tar.gz > dist/hnx_darwin_arm64.tar.gz.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            dist/hnx_darwin_arm64.tar.gz
            dist/hnx_darwin_arm64.tar.gz.sha256
