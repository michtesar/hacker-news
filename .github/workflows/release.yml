name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build darwin arm64 binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/hnx ./cmd/hnx
          tar -C dist -czf dist/hnx_darwin_arm64.tar.gz hnx
          shasum -a 256 dist/hnx_darwin_arm64.tar.gz > dist/hnx_darwin_arm64.tar.gz.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hnx_darwin_arm64.tar.gz
            dist/hnx_darwin_arm64.tar.gz.sha256
